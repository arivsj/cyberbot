<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driving Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Segoe UI',Arial,sans-serif;user-select:none}
canvas{display:block}
#hud{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;pointer-events:none;text-shadow:0 0 10px rgba(0,0,0,.8),0 0 20px rgba(0,0,0,.5);display:flex;align-items:center;gap:30px;background:rgba(0,0,0,.4);padding:12px 28px;border-radius:12px;backdrop-filter:blur(8px);font-weight:300;letter-spacing:.5px}
#hud .speed{font-size:38px;font-weight:700;letter-spacing:-1px}
#hud .speed span{font-size:16px;font-weight:300;margin-left:4px}
#hud .info{display:flex;flex-direction:column;gap:4px;font-size:13px;opacity:.8}
#hud .info .row{display:flex;gap:16px}
#hud .label{opacity:.6}
#controls-help{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:12px;pointer-events:none;text-shadow:0 0 10px rgba(0,0,0,.8);background:rgba(0,0,0,.3);padding:8px 16px;border-radius:8px;backdrop-filter:blur(4px);transition:opacity 2s;letter-spacing:.3px}
#controls-help.hidden{opacity:0}
#flash-message{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,200,100,.9);font-size:28px;font-weight:300;pointer-events:none;text-shadow:0 0 30px rgba(0,0,0,.9);opacity:0;transition:opacity 1s;text-align:center;letter-spacing:1px}
#flash-message.show{opacity:1}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:1000;font-size:18px;font-weight:300;letter-spacing:1px}
#loading .spinner{width:50px;height:50px;border:3px solid rgba(255,255,255,.1);border-top-color:#ffd700;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading .status{font-size:13px;opacity:.6;margin-top:12px}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div>Loading World</div><div class="status">Generating terrain...</div></div>
<div id="controls-help">W / ↑ Accelerate &nbsp;·&nbsp; S / ↓ Brake &nbsp;·&nbsp; A / ← Steer Left &nbsp;·&nbsp; D / → Steer Right &nbsp;·&nbsp; H Headlights &nbsp;·&nbsp; F Rain &nbsp;·&nbsp; R Reset</div>
<div id="flash-message"></div>
<div id="hud">
<div class="speed" id="speed-display">0 <span>km/h</span></div>
<div class="info">
<div class="row"><span id="gear-display">N</span><span id="rpm-display">0 RPM</span></div>
<div class="row"><span id="lights-display">● Lights OFF</span><span id="time-display">12:00</span></div>
</div>
</div>

<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.157.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
}
}
</script>

<script type="module">
import * as THREE from 'three';
const CONFIG = {
  TERRAIN_SIZE: 1500,
  TERRAIN_SEGMENTS: 180,
  ROAD_INTERVAL: 120,
  ROAD_WIDTH: 10,
  MAX_BUILDINGS: 400,
  MAX_TREES: 800,
  MAX_NPC: 15,
  GRAVITY: -9.81,
  CAR_MASS: 1400,
  SUSPENSION_REST: 0.45,
  SUSPENSION_STIFFNESS: 28000,
  SUSPENSION_DAMPING: 2500,
  MAX_DRIVE_FORCE: 9000,
  MAX_BRAKE_FORCE: 18000,
  MAX_STEER_ANGLE: 0.6,
  WHEEL_RADIUS: 0.35,
  FRICTION: 3.5,
};

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function smoothstep(t) { return t * t * (3 - 2 * t); }

function hash(x, z) {
  let n = Math.floor(x * 374761393 + z * 668265263);
  n = ((n ^ (n >> 13)) * 1274126177) & 0x7fffffff;
  return (n ^ (n >> 16)) / 0x7fffffff;
}

function smoothNoise(x, z) {
  const ix = Math.floor(x), iz = Math.floor(z);
  const fx = x - ix, fz = z - iz;
  const sx = smoothstep(fx), sz = smoothstep(fz);
  const v00 = hash(ix, iz), v10 = hash(ix + 1, iz);
  const v01 = hash(ix, iz + 1), v11 = hash(ix + 1, iz + 1);
  return lerp(lerp(v00, v10, sx), lerp(v01, v11, sx), sz);
}

function fbm(x, z, octaves = 4) {
  let val = 0, amp = 1, freq = 1, maxVal = 0;
  for (let i = 0; i < octaves; i++) {
    val += amp * smoothNoise(x * freq, z * freq);
    maxVal += amp;
    amp *= 0.5;
    freq *= 2;
  }
  return val / maxVal;
}

function getTerrainHeight(x, z) {
  const h = fbm(x * 0.004, z * 0.004, 4) * 30;
  const h2 = fbm(x * 0.015, z * 0.015, 2) * 5;
  return h + h2 - 5;
}

const _v3 = new THREE.Vector3();
const _q = new THREE.Quaternion();
const _m = new THREE.Matrix4();
const _up = new THREE.Vector3(0, 1, 0);
const _down = new THREE.Vector3(0, -1, 0);

class RigidBody {
  constructor(mass, inertia) {
    this.mass = mass;
    this.invMass = 1 / mass;
    this.inertia = inertia;
    this.invInertia = new THREE.Matrix3().copy(inertia).invert();
    this.position = new THREE.Vector3();
    this.velocity = new THREE.Vector3();
    this.quaternion = new THREE.Quaternion();
    this.angularVelocity = new THREE.Vector3();
    this.force = new THREE.Vector3();
    this.torque = new THREE.Vector3();
  }

  getVelocityAtPoint(point) {
    const r = _v3.copy(point).sub(this.position);
    const omegaCrossR = _v3.copy(this.angularVelocity).cross(r);
    return _v3.copy(this.velocity).add(omegaCrossR);
  }

  addForceAtPoint(force, point) {
    this.force.add(force);
    const r = _v3.copy(point).sub(this.position);
    this.torque.add(_v3.copy(r).cross(force));
  }

  integrate(dt) {
    this.velocity.add(_v3.copy(this.force).multiplyScalar(this.invMass * dt));
    this.position.add(_v3.copy(this.velocity).multiplyScalar(dt));

    if (this.invInertia) {
      const invIxx = this.invInertia.elements[0];
      const invIyy = this.invInertia.elements[4];
      const invIzz = this.invInertia.elements[8];
      const invQuat = this.quaternion.clone().invert();
      const torqueBody = this.torque.clone().applyQuaternion(invQuat);
      const angAccBody = new THREE.Vector3(
        torqueBody.x * invIxx, torqueBody.y * invIyy, torqueBody.z * invIzz
      );
      const angAccWorld = angAccBody.applyQuaternion(this.quaternion);
      this.angularVelocity.add(_v3.copy(angAccWorld).multiplyScalar(dt));

      const halfRot = _v3.copy(this.angularVelocity).multiplyScalar(0.5 * dt);
      const dq = new THREE.Quaternion(halfRot.x, halfRot.y, halfRot.z, 0);
      this.quaternion.multiply(dq);
      this.quaternion.normalize();
    }

    this.force.set(0, 0, 0);
    this.torque.set(0, 0, 0);
  }
}

class Vehicle {
  constructor(scene, terrain) {
    this.scene = scene;
    this.terrain = terrain;
    this.raycaster = new THREE.Raycaster();

    this.body = new RigidBody(CONFIG.CAR_MASS, new THREE.Matrix3().set(
      600, 0, 0, 0, 2200, 0, 0, 0, 2400
    ));
    const startH = getTerrainHeight(80, 80);
    this.body.position.set(80, startH + 1.5, 80);

    this.halfWidth = 0.9;
    this.halfLength = 2.0;

    this.wheelOffsets = [
      new THREE.Vector3(-this.halfWidth, 0, this.halfLength - 0.4),
      new THREE.Vector3(this.halfWidth, 0, this.halfLength - 0.4),
      new THREE.Vector3(-this.halfWidth, 0, -this.halfLength + 0.4),
      new THREE.Vector3(this.halfWidth, 0, -this.halfLength + 0.4),
    ];

    this.wheelHits = [false, false, false, false];
    this.wheelDistances = [1, 1, 1, 1];
    this.wheelCompressions = [0, 0, 0, 0];

    this.steerAngle = 0;
    this.throttle = 0;
    this.brake = 0;
    this.wheelRotations = [0, 0, 0, 0];
    this.headlightsOn = false;

    this.speedKmh = 0;
    this.currentGear = 0;
    this.rpm = 0;

    this.maxReverseSpeed = 5;
    this.gearRatios = [-3.5, 0, 3.5, 2.1, 1.4, 1.0, 0.75];
    this.finalDrive = 3.2;

    this._buildVisual(scene);
  }

  _buildVisual(scene) {
    const bodyGeo = new THREE.BoxGeometry(1.8, 0.7, 4.0);
    this.chassis = new THREE.Mesh(bodyGeo, new THREE.MeshStandardMaterial({
      color: 0x222244, metalness: 0.6, roughness: 0.3
    }));
    this.chassis.position.copy(this.body.position);
    this.chassis.position.y += 0.4;
    scene.add(this.chassis);

    const cabinGeo = new THREE.BoxGeometry(1.6, 0.45, 1.8);
    this.cabin = new THREE.Mesh(cabinGeo, new THREE.MeshStandardMaterial({
      color: 0x1a1a3a, metalness: 0.3, roughness: 0.5, transparent: true, opacity: 0.7
    }));
    this.cabin.position.set(0, 0.85, -0.3);
    this.chassis.add(this.cabin);

    const bumperGeo = new THREE.BoxGeometry(1.7, 0.15, 0.15);
    const bumperMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const frontBumper = new THREE.Mesh(bumperGeo, bumperMat);
    frontBumper.position.set(0, -0.15, 2.05);
    this.chassis.add(frontBumper);
    const rearBumper = frontBumper.clone();
    rearBumper.position.set(0, -0.15, -2.05);
    this.chassis.add(rearBumper);

    this.wheelMeshes = [];
    const wheelGeo = new THREE.CylinderGeometry(CONFIG.WHEEL_RADIUS, CONFIG.WHEEL_RADIUS, 0.25, 12);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
    const rimGeo = new THREE.CylinderGeometry(CONFIG.WHEEL_RADIUS * 0.5, CONFIG.WHEEL_RADIUS * 0.5, 0.26, 8);
    const rimMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.7, roughness: 0.3 });

    for (let i = 0; i < 4; i++) {
      const group = new THREE.Group();
      const tire = new THREE.Mesh(wheelGeo, wheelMat);
      tire.rotation.x = Math.PI / 2;
      group.add(tire);
      const rim = new THREE.Mesh(rimGeo, rimMat);
      rim.rotation.x = Math.PI / 2;
      group.add(rim);
      group.position.copy(this.wheelOffsets[i]);
      group.position.y = -0.45;
      this.chassis.add(group);
      this.wheelMeshes.push(group);
    }

    this.headlightMat = new THREE.MeshStandardMaterial({
      color: 0xffffcc, emissive: 0xffffcc, emissiveIntensity: 0, transparent: true, opacity: 0.8
    });
    const hlGeo = new THREE.SphereGeometry(0.1, 8, 8);
    this.headlightL = new THREE.Mesh(hlGeo, this.headlightMat);
    this.headlightL.position.set(-0.5, 0.2, 2.03);
    this.chassis.add(this.headlightL);
    this.headlightR = new THREE.Mesh(hlGeo, this.headlightMat);
    this.headlightR.position.set(0.5, 0.2, 2.03);
    this.chassis.add(this.headlightR);

    this.headlightSpot = new THREE.SpotLight(0xffffcc, 0, 60, Math.PI / 6, 0.5, 2);
    this.headlightSpot.target.position.set(0, -2, 10);
    this.headlightSpot.position.set(0, 0.3, 2.1);
    this.chassis.add(this.headlightSpot);
    this.chassis.add(this.headlightSpot.target);

    this.taillightMat = new THREE.MeshStandardMaterial({
      color: 0xff2200, emissive: 0xff2200, emissiveIntensity: 0.3
    });
    const tlGeo = new THREE.BoxGeometry(0.2, 0.1, 0.05);
    const taillightL = new THREE.Mesh(tlGeo, this.taillightMat);
    taillightL.position.set(-0.6, 0.2, -2.03);
    this.chassis.add(taillightL);
    const taillightR = new THREE.Mesh(tlGeo, this.taillightMat);
    taillightR.position.set(0.6, 0.2, -2.03);
    this.chassis.add(taillightR);
  }

  update(dt, input) {
    if (!dt || dt > 0.05) dt = 0.016;

    this.throttle = clamp(input.throttle || 0, -1, 1);
    this.brake = clamp(input.brake || 0, 0, 1);
    this.steerAngle = clamp(input.steer || 0, -1, 1) * CONFIG.MAX_STEER_ANGLE;

    const speed = this.body.velocity.length();
    this.speedKmh = speed * 3.6;

    const fwd = new THREE.Vector3(0, 0, 1).applyQuaternion(this.body.quaternion);

    this._updateGearAndRPM(dt);
    this._applySuspension(dt);
    this._applyDrive(dt);
    this._applyAerodynamicDrag();

    this.body.integrate(dt);

    if (this.body.position.y < -10) {
      this.body.position.set(0, 3, 0);
      this.body.velocity.set(0, 0, 0);
      this.body.angularVelocity.set(0, 0, 0);
    }

    this._updateVisual(dt);
    this._updateHeadlights();
  }

  _updateGearAndRPM(dt) {
    const speed = this.body.velocity.length();
    const fwd = new THREE.Vector3(0, 0, 1).applyQuaternion(this.body.quaternion);
    const forwardSpeed = this.body.velocity.dot(fwd);

    if (forwardSpeed > -1 && forwardSpeed < 0.5) {
      this.currentGear = 1;
    } else if (forwardSpeed < -0.5) {
      this.currentGear = 0;
    } else if (forwardSpeed < 15) {
      this.currentGear = 2;
    } else if (forwardSpeed < 25) {
      this.currentGear = 3;
    } else if (forwardSpeed < 35) {
      this.currentGear = 4;
    } else if (forwardSpeed < 45) {
      this.currentGear = 5;
    } else {
      this.currentGear = 6;
    }

    const ratio = this.gearRatios[this.currentGear] * this.finalDrive;
    const wheelSpeed = speed / (CONFIG.WHEEL_RADIUS);
    this.rpm = Math.abs(wheelSpeed * ratio * 15) + 800;
    this.rpm = clamp(this.rpm, 700, 7200);
  }

  _applySuspension(dt) {
    const gravityForce = new THREE.Vector3(0, CONFIG.GRAVITY * this.body.mass, 0);
    this.body.force.add(gravityForce);
    const fwdDir = new THREE.Vector3(0, 0, 1).applyQuaternion(this.body.quaternion);

    for (let i = 0; i < 4; i++) {
      const localOffset = this.wheelOffsets[i];
      const worldOffset = _v3.copy(localOffset).applyQuaternion(this.body.quaternion);
      const wheelWorldPos = _v3.copy(this.body.position).add(worldOffset);

      this.raycaster.set(wheelWorldPos, _down);
      const intersects = this.raycaster.intersectObject(this.terrain, false);

      if (intersects.length > 0 && intersects[0].distance < CONFIG.SUSPENSION_REST + 0.3) {
        const dist = intersects[0].distance;
        const compression = 1 - (dist / CONFIG.SUSPENSION_REST);
        const clampedCompression = clamp(compression, 0, 1);

        const pointVel = this.body.getVelocityAtPoint(wheelWorldPos);
        const velAlongUp = -pointVel.y;

        const springForce = CONFIG.SUSPENSION_STIFFNESS * clampedCompression;
        const damperForce = CONFIG.SUSPENSION_DAMPING * velAlongUp;
        const totalForce = springForce + damperForce;

        const force = _v3.set(0, Math.max(0, totalForce), 0);
        this.body.addForceAtPoint(force, wheelWorldPos);

        const normal = intersects[0].face.normal.clone();
        const pointVel2 = this.body.getVelocityAtPoint(wheelWorldPos);
        const lateralDir = _v3.copy(normal).cross(fwdDir).normalize();
        if (lateralDir.length() > 0.01) {
          const latVel = pointVel2.dot(lateralDir);
          const latFriction = _v3.copy(lateralDir).multiplyScalar(-latVel * CONFIG.FRICTION * 300);
          this.body.addForceAtPoint(latFriction, wheelWorldPos);
        }

        this.wheelHits[i] = true;
        this.wheelDistances[i] = dist;
        this.wheelCompressions[i] = clampedCompression;
      } else {
        this.wheelHits[i] = false;
        this.wheelDistances[i] = CONFIG.SUSPENSION_REST;
        this.wheelCompressions[i] = 0;
      }
    }
  }

  _applyDrive(dt) {
    const carFwd = new THREE.Vector3(0, 0, 1).applyQuaternion(this.body.quaternion);
    const carRight = new THREE.Vector3(1, 0, 0).applyQuaternion(this.body.quaternion);

    for (let i = 0; i < 4; i++) {
      if (!this.wheelHits[i]) continue;

      const localOffset = this.wheelOffsets[i];
      const worldOffset = _v3.copy(localOffset).applyQuaternion(this.body.quaternion);
      const wheelWorldPos = _v3.copy(this.body.position).add(worldOffset);

      const pointVel = this.body.getVelocityAtPoint(wheelWorldPos);

      let wheelFwd = carFwd.clone();
      if (i < 2) {
        const steerCos = Math.cos(this.steerAngle);
        const steerSin = Math.sin(this.steerAngle);
        wheelFwd.set(0, 0, 1).applyQuaternion(this.body.quaternion);
        wheelFwd.multiplyScalar(steerCos).add(carRight.clone().multiplyScalar(steerSin));
        wheelFwd.normalize();
      }

      const lateral = new THREE.Vector3().crossVectors(wheelFwd, _up).normalize();
      if (isNaN(lateral.x)) lateral.set(1, 0, 0);

      if (i >= 2) {
        const driveForce = _v3.copy(wheelFwd).multiplyScalar(this.throttle * CONFIG.MAX_DRIVE_FORCE);
        this.body.addForceAtPoint(driveForce, wheelWorldPos);
      }

      if (this.brake > 0) {
        const fwdVel = pointVel.dot(wheelFwd);
        const brakeForce = _v3.copy(wheelFwd).multiplyScalar(-fwdVel * CONFIG.MAX_BRAKE_FORCE * this.brake);
        this.body.addForceAtPoint(brakeForce, wheelWorldPos);
      }

      const latVel = pointVel.dot(lateral);
      const frictionForce = _v3.copy(lateral).multiplyScalar(-latVel * CONFIG.FRICTION * this.body.mass * 2);
      this.body.addForceAtPoint(frictionForce, wheelWorldPos);
    }
  }

  _applyAerodynamicDrag() {
    const speed = this.body.velocity.length();
    if (speed > 0.5) {
      const drag = _v3.copy(this.body.velocity).normalize().multiplyScalar(-speed * speed * 0.3);
      this.body.force.add(drag);
    }
  }

  _updateVisual(dt) {
    this.chassis.position.copy(this.body.position);
    this.chassis.position.y += 0.4;
    this.chassis.quaternion.copy(this.body.quaternion);

    const speed = this.body.velocity.length();
    const rotSpeed = (speed / CONFIG.WHEEL_RADIUS) * dt;

    for (let i = 0; i < 4; i++) {
      this.wheelRotations[i] += rotSpeed;
      const mesh = this.wheelMeshes[i];

      const compression = this.wheelCompressions[i];
      const suspensionTravel = (1 - compression) * CONFIG.SUSPENSION_REST * 0.5;
      mesh.position.copy(this.wheelOffsets[i]);
      mesh.position.y = -0.45 - suspensionTravel;

      if (i < 2) {
        mesh.rotation.y = this.steerAngle;
      }
    }

    for (let i = 0; i < 4; i++) {
      const wm = this.wheelMeshes[i];
      if (wm.children.length >= 2) {
        wm.children[0].rotation.z = this.wheelRotations[i];
        wm.children[1].rotation.z = this.wheelRotations[i];
      }
    }

    const bodyTilt = new THREE.Quaternion();
    const lateralAccel = this.body.velocity.dot(
      new THREE.Vector3(1, 0, 0).applyQuaternion(this.body.quaternion)
    ) * 0.003;
    const fwd = new THREE.Vector3(0, 0, 1).applyQuaternion(this.body.quaternion);
    const longAccel = this.body.velocity.dot(fwd) * 0.001;
    bodyTilt.setFromAxisAngle(new THREE.Vector3(0, 0, 1), -lateralAccel);
    const pitchTilt = new THREE.Quaternion();
    pitchTilt.setFromAxisAngle(new THREE.Vector3(1, 0, 0), longAccel * 0.5);
    bodyTilt.multiply(pitchTilt);
    this.chassis.quaternion.multiply(bodyTilt);
  }

  _updateHeadlights() {
    const intensity = this.headlightsOn ? 1.5 : 0;
    this.headlightMat.emissiveIntensity = intensity;
    this.headlightSpot.intensity = intensity * 80;
  }

  toggleHeadlights() {
    this.headlightsOn = !this.headlightsOn;
    this._updateHeadlights();
    return this.headlightsOn;
  }
}

class RoadNetwork {
  constructor(scene) {
    this.scene = scene;
    this.roads = [];
    this.intersections = [];
    this.roadMeshes = [];
    this.laneMarkings = [];
    this._build();
  }

  _build() {
    const interval = CONFIG.ROAD_INTERVAL;
    const half = CONFIG.TERRAIN_SIZE / 2;
    const roadMat = new THREE.MeshStandardMaterial({
      color: 0x333840, roughness: 0.95, metalness: 0.1
    });
    const sidewalkMat = new THREE.MeshStandardMaterial({
      color: 0x888a8a, roughness: 0.9
    });

    for (let x = -half + interval; x < half; x += interval) {
      this.roads.push({ x1: x, z1: -half, x2: x, z2: half, h: 0.15 });
    }
    for (let z = -half + interval; z < half; z += interval) {
      this.roads.push({ x1: -half, z1: z, x2: half, z2: z, h: 0.15 });
    }

    for (const r of this.roads) {
      const dx = r.x2 - r.x1, dz = r.z2 - r.z1;
      const len = Math.sqrt(dx * dx + dz * dz);
      const angle = Math.atan2(dx, dz);
      const w = CONFIG.ROAD_WIDTH;

      const roadGeo = new THREE.PlaneGeometry(w, len);
      const road = new THREE.Mesh(roadGeo, roadMat);
      road.rotation.x = -Math.PI / 2;
      road.position.set((r.x1 + r.x2) / 2, 0.02, (r.z1 + r.z2) / 2);
      road.rotation.z = angle;
      road.receiveShadow = true;
      this.scene.add(road);
      this.roadMeshes.push(road);

      const lineMat = new THREE.MeshStandardMaterial({
        color: 0xffcc00, emissive: 0xffcc00, emissiveIntensity: 0.1
      });
      const lineGeo = new THREE.PlaneGeometry(0.15, len - 2);
      const line = new THREE.Mesh(lineGeo, lineMat);
      line.rotation.x = -Math.PI / 2;
      line.position.set((r.x1 + r.x2) / 2, 0.04, (r.z1 + r.z2) / 2);
      line.rotation.z = angle;
      this.scene.add(line);
    }

    for (let x = -half + interval; x < half; x += interval) {
      for (let z = -half + interval; z < half; z += interval) {
        this.intersections.push({ x, z });
        const isGeo = new THREE.PlaneGeometry(CONFIG.ROAD_WIDTH, CONFIG.ROAD_WIDTH);
        const is = new THREE.Mesh(isGeo, roadMat);
        is.rotation.x = -Math.PI / 2;
        is.position.set(x, 0.02, z);
        is.receiveShadow = true;
        this.scene.add(is);
        this.roadMeshes.push(is);
      }
    }
  }

  getRoadPositions() {
    const positions = [];
    for (const r of this.roads) {
      const dx = r.x2 - r.x1, dz = r.z2 - r.z1;
      const len = Math.sqrt(dx * dx + dz * dz);
      const steps = Math.floor(len / 10);
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const x = lerp(r.x1, r.x2, t);
        const z = lerp(r.z1, r.z2, t);
        const height = getTerrainHeight(x, z);
        positions.push(new THREE.Vector3(x, height + 0.1, z));
      }
    }
    return positions;
  }

  getRandomRoadPoint() {
    const r = this.roads[Math.floor(Math.random() * this.roads.length)];
    const t = Math.random();
    const x = lerp(r.x1, r.x2, t);
    const z = lerp(r.z1, r.z2, t);
    const h = getTerrainHeight(x, z);
    return new THREE.Vector3(x, h + 0.1, z);
  }
}

class BuildingGenerator {
  constructor(scene) {
    this.scene = scene;
    this.buildings = [];
    this._generate();
  }

  _generate() {
    const interval = CONFIG.ROAD_INTERVAL;
    const half = CONFIG.TERRAIN_SIZE / 2 - 20;
    const colors = [0x886644, 0x887766, 0x778899, 0x667788, 0x996644, 0x555566, 0x445566, 0x664422, 0x777777];

    let count = 0;
    for (let x = -half + interval / 2; x < half && count < CONFIG.MAX_BUILDINGS; x += interval / 2) {
      for (let z = -half + interval / 2; z < half && count < CONFIG.MAX_BUILDINGS; z += interval / 2) {
        const rx = Math.floor(x / (interval / 2));
        const rz = Math.floor(z / (interval / 2));

        if (rx % 2 === 0 || rz % 2 === 0) continue;

        const rand = hash(x, z);
        if (rand < 0.35) continue;

        const width = 6 + rand * 14;
        const depth = 6 + hash(x + 100, z + 100) * 14;
        const height = 4 + hash(x + 200, z + 200) * 30;
        const color = colors[Math.floor(hash(x + 300, z + 300) * colors.length)];

        const h = getTerrainHeight(x, z);
        const geo = new THREE.BoxGeometry(width, height, depth);
        const mat = new THREE.MeshStandardMaterial({
          color, roughness: 0.8, metalness: 0.1
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, h + height / 2, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        this.scene.add(mesh);
        this.buildings.push(mesh);
        count++;

        if (height > 12 && hash(x + 400, z + 400) > 0.5) {
          const wMat = new THREE.MeshStandardMaterial({
            color: 0x88bbff, emissive: 0x88bbff,
            emissiveIntensity: 0.05 + hash(x + 500, z + 500) * 0.1,
            transparent: true, opacity: 0.4
          });
          for (let wy = 1; wy < height - 1; wy += 3) {
            for (let wx = -1; wx <= 1; wx += 2) {
              for (let wz = -1; wz <= 1; wz += 2) {
                const wGeo = new THREE.PlaneGeometry(1.5, 1.8);
                const win = new THREE.Mesh(wGeo, wMat);
                win.position.set(wx * (width * 0.35), wy - height / 2 + 1, wz * (depth * 0.35));
                mesh.add(win);
              }
            }
          }
        }

        if (height > 15) {
          const roofMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.9 });
          const roof = new THREE.Mesh(
            new THREE.BoxGeometry(width + 0.4, 0.3, depth + 0.4), roofMat
          );
          roof.position.y = height / 2;
          mesh.add(roof);
        }
      }
    }
  }

  getBuildings() { return this.buildings; }
}

class TreeGenerator {
  constructor(scene) {
    this.scene = scene;
    this.trees = [];
    this._generate();
  }

  _generate() {
    const half = CONFIG.TERRAIN_SIZE / 2 - 30;
    const roadInterval = CONFIG.ROAD_INTERVAL;

    let count = 0;
    for (let x = -half; x < half && count < CONFIG.MAX_TREES; x += 6) {
      for (let z = -half; z < half && count < CONFIG.MAX_TREES; z += 6) {
        const rx = Math.round(x / (roadInterval / 2));
        const nearRoad = Math.abs(x - rx * (roadInterval / 2)) < CONFIG.ROAD_WIDTH / 2 + 4 ||
                          Math.abs(z - rx * (roadInterval / 2)) < CONFIG.ROAD_WIDTH / 2 + 4;
        if (nearRoad) continue;

        const rand = hash(x * 0.7, z * 0.7);
        if (rand < 0.7) continue;

        const h = getTerrainHeight(x, z);
        const variant = hash(x + 999, z + 999);

        if (variant < 0.6) {
          const trunkH = 2 + variant * 4;
          const canopyR = 1.5 + variant * 2.5;

          const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.15, 0.25, trunkH, 6),
            new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.9 })
          );
          trunk.position.set(x, h + trunkH / 2, z);
          trunk.castShadow = true;
          this.scene.add(trunk);

          const canopy = new THREE.Mesh(
            new THREE.SphereGeometry(canopyR, 7, 7),
            new THREE.MeshStandardMaterial({
              color: 0x2e7d32, roughness: 0.9, metalness: 0
            })
          );
          canopy.position.set(x, h + trunkH + canopyR * 0.5, z);
          canopy.castShadow = true;
          this.scene.add(canopy);
          this.trees.push(trunk, canopy);
        } else {
          const trunkH = 3 + variant * 5;
          const canopyR = 1.0 + variant * 1.5;

          const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.1, 0.2, trunkH, 6),
            new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.9 })
          );
          trunk.position.set(x, h + trunkH / 2, z);
          trunk.castShadow = true;
          this.scene.add(trunk);

          const canopy = new THREE.Mesh(
            new THREE.ConeGeometry(canopyR * 1.5, canopyR * 2.5, 7),
            new THREE.MeshStandardMaterial({
              color: 0x1b5e20, roughness: 0.9
            })
          );
          canopy.position.set(x, h + trunkH + canopyR * 0.6, z);
          canopy.castShadow = true;
          this.scene.add(canopy);
          this.trees.push(trunk, canopy);
        }
        count++;
      }
    }
  }
}

class NPCVehicle {
  constructor(scene, path, index) {
    this.scene = scene;
    this.path = path;
    this.index = index;
    this.speed = 8 + Math.random() * 6;
    this.targetSpeed = this.speed;
    this.pathIndex = 0;
    this.alive = true;

    const colors = [0xcc3333, 0x3366cc, 0x33aa33, 0xcccc33, 0xff6600, 0x9933cc, 0xffffff, 0x333333, 0xcc6633];
    const color = colors[Math.floor(Math.random() * colors.length)];

    this.mesh = new THREE.Mesh(
      new THREE.BoxGeometry(1.6, 0.6, 3.0),
      new THREE.MeshStandardMaterial({ color, roughness: 0.7, metalness: 0.2 })
    );
    this.mesh.castShadow = true;

    if (path && path.length > 0) {
      const p = path[0];
      this.mesh.position.copy(p);
      this.mesh.position.y += 0.3;
    }
    scene.add(this.mesh);

    const cabinMat = new THREE.MeshStandardMaterial({
      color: 0x223344, transparent: true, opacity: 0.5, roughness: 0.3
    });
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.3, 1.4), cabinMat);
    cabin.position.y = 0.45;
    this.mesh.add(cabin);
  }

  update(dt, playerPos) {
    if (!this.alive || !this.path || this.path.length < 2) return;

    const target = this.path[this.pathIndex];
    const pos = this.mesh.position;
    const toTarget = _v3.copy(target).sub(pos);
    toTarget.y = 0;
    const dist = toTarget.length();

    if (dist < 2) {
      this.pathIndex = (this.pathIndex + 1) % this.path.length;
    }

    if (playerPos) {
      const toPlayer = _v3.copy(playerPos).sub(pos);
      toPlayer.y = 0;
      const playerDist = toPlayer.length();
      if (playerDist < 20) {
        this.targetSpeed = Math.max(3, this.speed * (playerDist / 20));
      } else {
        this.targetSpeed = this.speed;
      }
    }

    this.speed = lerp(this.speed, this.targetSpeed, dt * 2);

    const dir = toTarget.clone().normalize();
    const move = dir.clone().multiplyScalar(this.speed * dt);
    pos.x += move.x;
    pos.z += move.z;
    pos.y = getTerrainHeight(pos.x, pos.z) + 0.3;

    const angle = Math.atan2(dir.x, dir.z);
    this.mesh.rotation.y = angle;
  }

  dispose() {
    this.scene.remove(this.mesh);
    this.alive = false;
  }
}

class TrafficLight {
  constructor(scene, position) {
    this.scene = scene;
    this.position = position;
    this.state = Math.random() < 0.5 ? 'green' : 'red';
    this.timer = 3 + Math.random() * 4;
    this.stateTimer = 0;

    const poleMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 2.5, 6), poleMat);
    pole.position.set(position.x, getTerrainHeight(position.x, position.z) + 1.25, position.z);

    const headMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5 });
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.3), headMat);
    head.position.set(position.x, getTerrainHeight(position.x, position.z) + 2.7, position.z);

    this.redLight = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0 })
    );
    this.redLight.position.set(0, 0.2, 0.16);
    head.add(this.redLight);

    this.greenLight = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 0 })
    );
    this.greenLight.position.set(0, -0.2, 0.16);
    head.add(this.greenLight);

    scene.add(pole);
    scene.add(head);
    this.pole = pole;
    this.head = head;
    this._updateLights();
  }

  _updateLights() {
    const isGreen = this.state === 'green';
    this.redLight.material.emissiveIntensity = isGreen ? 0 : 2;
    this.greenLight.material.emissiveIntensity = isGreen ? 2 : 0;
  }

  update(dt) {
    this.stateTimer += dt;
    if (this.stateTimer > this.timer) {
      this.stateTimer = 0;
      this.state = this.state === 'green' ? 'red' : 'green';
      this.timer = 3 + Math.random() * 4;
      this._updateLights();
    }
  }

  isGreen() { return this.state === 'green'; }
}

class WeatherSystem {
  constructor(scene) {
    this.scene = scene;
    this.rainEnabled = false;
    this.fogDensity = 0.002;
    this.targetFog = 0.002;
    this.rainParticles = null;
    this.rainCount = 0;
    this._setup();
  }

  _setup() {
    const count = 8000;
    const positions = new Float32Array(count * 3);
    this.rainGeom = new THREE.BufferGeometry();
    this.rainGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    this.rainMat = new THREE.PointsMaterial({
      color: 0x8899cc,
      size: 0.15,
      transparent: true,
      opacity: 0.4,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    this.rainParticles = new THREE.Points(this.rainGeom, this.rainMat);
    this.rainParticles.visible = false;
    this.scene.add(this.rainParticles);
    this.rainCount = count;

    this._resetRain();
  }

  _resetRain() {
    const pos = this.rainGeom.attributes.position.array;
    for (let i = 0; i < this.rainCount; i++) {
      pos[i * 3] = (Math.random() - 0.5) * CONFIG.TERRAIN_SIZE;
      pos[i * 3 + 1] = Math.random() * 60;
      pos[i * 3 + 2] = (Math.random() - 0.5) * CONFIG.TERRAIN_SIZE;
    }
    this.rainGeom.attributes.position.needsUpdate = true;
  }

  toggleRain() {
    this.rainEnabled = !this.rainEnabled;
    this.rainParticles.visible = this.rainEnabled;
    this.targetFog = this.rainEnabled ? 0.012 : 0.002;
    if (this.rainEnabled) this._resetRain();
  }

  update(dt, cameraPos) {
    this.fogDensity = lerp(this.fogDensity, this.targetFog, dt * 0.5);

    if (this.rainEnabled && this.rainParticles) {
      const pos = this.rainGeom.attributes.position.array;
      for (let i = 0; i < this.rainCount; i++) {
        pos[i * 3 + 1] -= 15 * dt;
        pos[i * 3] += Math.sin(pos[i * 3 + 1] * 0.5 + Date.now() * 0.001) * 0.3 * dt;
        if (pos[i * 3 + 1] < -2) {
          pos[i * 3] = cameraPos.x + (Math.random() - 0.5) * 120;
          pos[i * 3 + 1] = 50 + Math.random() * 20;
          pos[i * 3 + 2] = cameraPos.z + (Math.random() - 0.5) * 120;
        }
      }
      this.rainGeom.attributes.position.needsUpdate = true;
    }
  }
}

class DayNightCycle {
  constructor(scene) {
    this.scene = scene;
    this.time = 6;
    this.dayLength = 240;
    this.sunIntensity = 1.2;
    this.ambientIntensity = 0.3;

    this.ambientLight = new THREE.AmbientLight(0x6688cc, this.ambientIntensity);
    scene.add(this.ambientLight);

    this.sunLight = new THREE.DirectionalLight(0xffeedd, this.sunIntensity);
    this.sunLight.position.set(100, 80, 50);
    this.sunLight.castShadow = true;
    this.sunLight.shadow.mapSize.width = 2048;
    this.sunLight.shadow.mapSize.height = 2048;
    this.sunLight.shadow.camera.near = 1;
    this.sunLight.shadow.camera.far = 300;
    this.sunLight.shadow.camera.left = -150;
    this.sunLight.shadow.camera.right = 150;
    this.sunLight.shadow.camera.top = 150;
    this.sunLight.shadow.camera.bottom = -150;
    scene.add(this.sunLight);

    this.heliLight = new THREE.DirectionalLight(0xccddff, 0.1);
    this.heliLight.position.set(-100, 60, -80);
    scene.add(this.heliLight);

    this.sunSphere = new THREE.Mesh(
      new THREE.SphereGeometry(15, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xffdd44 })
    );
    this.sunSphere.position.set(200, 100, 100);
    scene.add(this.sunSphere);

    scene.fog = new THREE.FogExp2(0x87ceeb, 0.002);
    this._update(0);
  }

  _update(dt) {
    const t = this.time / 24;
    const angle = t * Math.PI * 2;
    const sunX = Math.cos(angle) * 180;
    const sunY = Math.sin(angle) * 120;
    const sunZ = Math.sin(angle) * 100;

    this.sunLight.position.set(sunX, sunY + 20, sunZ);
    this.sunSphere.position.set(sunX * 1.5, sunY * 1.2 + 10, sunZ * 1.5);

    const nightFactor = clamp((sunY + 20) / 60, 0, 1);
    this.sunIntensity = lerp(0.1, 1.5, nightFactor);
    this.ambientIntensity = lerp(0.05, 0.4, nightFactor);
    this.sunLight.intensity = this.sunIntensity;
    this.ambientLight.intensity = this.ambientIntensity;
    this.heliLight.intensity = lerp(0.3, 0.05, nightFactor);

    const skyR = lerp(10, 135, nightFactor);
    const skyG = lerp(10, 180, nightFactor);
    const skyB = lerp(30, 220, nightFactor);
    const skyColor = new THREE.Color(`rgb(${skyR}, ${skyG}, ${skyB})`);

    this.scene.background = skyColor;
    if (this.scene.fog) {
      this.scene.fog.color.copy(skyColor);
    }

    const sunColor = new THREE.Color().setHSL(
      0.08 + (1 - nightFactor) * 0.03,
      0.8,
      0.5 + nightFactor * 0.4
    );
    this.sunLight.color.copy(sunColor);
    this.sunSphere.material.color.copy(sunColor);
    this.sunSphere.material.color.multiplyScalar(1.5);
  }

  update(dt) {
    this.time += dt / this.dayLength * 24;
    if (this.time > 24) this.time -= 24;
    this._update(dt);
  }

  getHour() { return this.time; }
  isNight() { return this.time < 6 || this.time > 20; }
}

class DrivingSimulator {
  constructor() {
    this.renderer = new THREE.WebGLRenderer({
      antialias: true, powerPreference: 'high-performance'
    });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.0;
    document.body.prepend(this.renderer.domElement);

    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x87ceeb);

    this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
    this.camera.position.set(0, 1.5, 0);

    this.input = { throttle: 0, brake: 0, steer: 0 };
    this.keys = {};
    this.running = true;
    this.clock = new THREE.Clock();

    this.terrain = null;
    this.roads = null;
    this.vehicle = null;
    this.npcs = [];
    this.trafficLights = [];
    this.weather = null;
    this.dayNight = null;
    this.buildingGen = null;
    this.treeGen = null;

    this.headlightCountdown = 0;
    this.autoHeadlights = false;
  }

  async init() {
    this._setupInput();
    this._setupResize();
    this._setupTerrain();
    this.roads = new RoadNetwork(this.scene);

    const loading = document.getElementById('loading');
    loading.querySelector('.status').textContent = 'Placing buildings...';
    await this._delay(50);
    this.buildingGen = new BuildingGenerator(this.scene);

    loading.querySelector('.status').textContent = 'Planting trees...';
    await this._delay(50);
    this.treeGen = new TreeGenerator(this.scene);

    loading.querySelector('.status').textContent = 'Initializing physics...';
    await this._delay(50);
    this.vehicle = new Vehicle(this.scene, this.terrain);

    loading.querySelector('.status').textContent = 'Spawning traffic...';
    await this._delay(50);
    this._setupTraffic();

    loading.querySelector('.status').textContent = 'Setting up weather...';
    this.dayNight = new DayNightCycle(this.scene);
    this.weather = new WeatherSystem(this.scene);

    loading.style.opacity = '0';
    setTimeout(() => loading.style.display = 'none', 1000);

    this.autoHeadlights = true;
    this._loop();
  }

  _delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

  _setupTerrain() {
    const size = CONFIG.TERRAIN_SIZE;
    const segs = CONFIG.TERRAIN_SEGMENTS;
    const geo = new THREE.PlaneGeometry(size, size, segs, segs);
    geo.rotateX(-Math.PI / 2);

    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const z = pos.getZ(i);
      pos.setY(i, getTerrainHeight(x, z));
    }
    geo.computeVertexNormals();

    const mat = new THREE.MeshStandardMaterial({
      color: 0x5a7a3a,
      roughness: 0.9,
      metalness: 0,
      flatShading: false
    });

    this.terrain = new THREE.Mesh(geo, mat);
    this.terrain.receiveShadow = true;
    this.terrain.matrixAutoUpdate = false;
    this.terrain.updateMatrix();
    this.scene.add(this.terrain);

    const vertexColors = new Float32Array(pos.count * 3);
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const z = pos.getZ(i);
      const h = pos.getY(i);
      const green = 0.2 + 0.3 * (h > 5 ? 0 : 1) + 0.1 * Math.sin(x * 0.02) * Math.cos(z * 0.02);
      const sand = h < -2 ? 0.4 : 0;
      const rock = h > 15 ? 0.3 : 0;
      vertexColors[i * 3] = 0.3 + sand - rock;
      vertexColors[i * 3 + 1] = 0.4 + green * 0.4;
      vertexColors[i * 3 + 2] = 0.15 + sand * 0.3;
    }
    geo.setAttribute('color', new THREE.BufferAttribute(vertexColors, 3));
    mat.vertexColors = true;
  }

  _setupTraffic() {
    const roadPts = this.roads.getRoadPositions();
    const interval = CONFIG.ROAD_INTERVAL;
    const half = CONFIG.TERRAIN_SIZE / 2 - 20;

    for (let i = 0; i < CONFIG.MAX_NPC; i++) {
      const x = -half + Math.random() * 2 * half;
      const z = -half + Math.random() * 2 * half;
      const nearbyRoad = roadPts.filter(p =>
        Math.sqrt((p.x - x) ** 2 + (p.z - z) ** 2) < interval * 0.7
      );
      const path = nearbyRoad.length > 10 ? nearbyRoad : roadPts;
      if (path.length > 0) {
        const npc = new NPCVehicle(this.scene, path, i);
        this.npcs.push(npc);
      }
    }

    const tlHalf = CONFIG.TERRAIN_SIZE / 2 - 40;
    const step = interval * 2;
    for (let x = -tlHalf + step; x < tlHalf; x += step) {
      for (let z = -tlHalf + step; z < tlHalf; z += step) {
        if (Math.random() < 0.4) {
          const tl = new TrafficLight(this.scene, new THREE.Vector3(x, 0, z));
          this.trafficLights.push(tl);
        }
      }
    }
  }

  _setupInput() {
    window.addEventListener('keydown', (e) => {
      this.keys[e.key] = true;
      if (e.key === 'h' || e.key === 'H') {
        if (this.vehicle) {
          const on = this.vehicle.toggleHeadlights();
          this._flashMessage(on ? 'Headlights ON' : 'Headlights OFF');
        }
      }
      if (e.key === 'r' || e.key === 'R') {
        if (this.vehicle) {
          const rh = getTerrainHeight(80, 80);
          this.vehicle.body.position.set(80, rh + 1.5, 80);
          this.vehicle.body.velocity.set(0, 0, 0);
          this.vehicle.body.angularVelocity.set(0, 0, 0);
        }
      }
      if (e.key === 'f' || e.key === 'F') {
        if (this.weather) this.weather.toggleRain();
      }
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown' ||
          e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      this.keys[e.key] = false;
    });

    for (const key of ['w', 'W', 'ArrowUp', 's', 'S', 'ArrowDown']) {
      window.addEventListener('keyup', (e) => {
        if (e.key === key) e.preventDefault();
      });
    }
  }

  _setupResize() {
    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  _flashMessage(text) {
    const el = document.getElementById('flash-message');
    el.textContent = text;
    el.classList.add('show');
    clearTimeout(this._flashTimer);
    this._flashTimer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  _updateInput() {
    const k = this.keys;

    let throttle = 0;
    if (k['w'] || k['W'] || k['ArrowUp']) throttle = 1;
    else if (k['s'] || k['S'] || k['ArrowDown']) throttle = -0.6;

    let brake = 0;
    if (k['s'] || k['S'] || k['ArrowDown']) brake = 1;

    let steer = 0;
    if (k['a'] || k['A'] || k['ArrowLeft']) steer = 1;
    if (k['d'] || k['D'] || k['ArrowRight']) steer = -1;

    this.input.throttle = throttle;
    this.input.brake = brake;
    this.input.steer = steer;
  }

  _updateCamera() {
    if (!this.vehicle) return;

    const body = this.vehicle.body;
    const fwd = new THREE.Vector3(0, 0, 1).applyQuaternion(body.quaternion);

    const targetPos = body.position.clone();
    targetPos.add(_v3.copy(fwd).multiplyScalar(0.1));
    targetPos.y += 1.5;

    const lookTarget = body.position.clone();
    lookTarget.add(_v3.copy(fwd).multiplyScalar(10));
    lookTarget.y += 0.8;

    this.camera.position.lerp(targetPos, 0.1);
    this.camera.lookAt(lookTarget);
  }

  _updateHUD() {
    if (!this.vehicle) return;

    const speed = Math.round(this.vehicle.speedKmh);
    document.getElementById('speed-display').innerHTML = `${speed} <span>km/h</span>`;

    const gears = ['R', 'N', '1', '2', '3', '4', '5', '6'];
    document.getElementById('gear-display').textContent = gears[this.vehicle.currentGear] || 'N';

    const rpm = Math.round(this.vehicle.rpm);
    document.getElementById('rpm-display').textContent = `${rpm} RPM`;

    const lights = this.vehicle.headlightsOn ? '● Lights ON' : '○ Lights OFF';
    document.getElementById('lights-display').style.color = this.vehicle.headlightsOn ? '#ffcc44' : '#888';
    document.getElementById('lights-display').textContent = lights;

    const hour = this.dayNight ? Math.floor(this.dayNight.getHour()) : 12;
    const min = this.dayNight ? Math.floor((this.dayNight.getHour() % 1) * 60) : 0;
    document.getElementById('time-display').textContent =
      `${String(hour).padStart(2, '0')}:${String(min).padStart(2, '0')}`;
  }

  _loop() {
    if (!this.running) return;
    requestAnimationFrame(() => this._loop());

    const dt = Math.min(this.clock.getDelta(), 0.05);
    this._updateInput();

    if (this.vehicle) this.vehicle.update(dt, this.input);
    if (this.dayNight) this.dayNight.update(dt);
    if (this.weather) {
      this.weather.update(dt, this.camera.position);
      if (this.scene.fog) this.scene.fog.density = this.weather.fogDensity;
    }

    for (const tl of this.trafficLights) tl.update(dt);

    const playerPos = this.vehicle ? this.vehicle.body.position : null;
    for (const npc of this.npcs) npc.update(dt, playerPos);

    if (this.autoHeadlights && this.dayNight) {
      const isNight = this.dayNight.isNight();
      if (isNight !== this.vehicle.headlightsOn) {
        this.headlightCountdown += dt;
        if (this.headlightCountdown > 2) {
          this.vehicle.headlightsOn = isNight;
          this.vehicle._updateHeadlights();
          this.headlightCountdown = 0;
        }
      } else {
        this.headlightCountdown = 0;
      }
    }

    for (const npc of this.npcs) {
      if (this.vehicle && npc.alive) {
        const dist = _v3.copy(npc.mesh.position).sub(this.vehicle.body.position).length();
        if (dist < 2.5) {
          this.vehicle.body.velocity.multiplyScalar(0.5);
          npc.speed *= 0.5;
        }
      }
    }

    this._updateCamera();
    this._updateHUD();

    this.renderer.render(this.scene, this.camera);
  }
}

const game = new DrivingSimulator();
game.init();
</script>
